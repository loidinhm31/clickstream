# Clickstream Analytics - Development Environment
#
# This Docker Compose file defines the infrastructure for local development:
# - Kafka (KRaft mode): Event broker for clickstream events
# - MongoDB: Document store for aggregated session data
# - Kafka UI: Web UI for Kafka inspection and debugging
# - kafka-init: One-time initialization to create topics
#
# Network: clickstream-net (bridge driver)
# Volumes: kafka-data, mongo-data (persist between runs)
#
# Resource limits are set to prevent local resource exhaustion.
# All services include health checks for orchestration and dependency management.
#
# To start: docker compose up -d
# To verify: bash scripts/verify-setup.sh
# To clean: docker compose down -v

services:
  # Apache Kafka 3.7.0 - Event streaming platform (KRaft mode)
  # Runs as both broker (KAFKA_PROCESS_ROLES: broker,controller) and controller
  # Listeners:
  #   - CONTROLLER: Internal KRaft controller communication (port 9093)
  #   - HOST: External access from host/WSL (port 9092)
  #   - DOCKER: Internal container communication (port 9094)
  # Topics: clickstream-events (6 partitions) created by kafka-init
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"    # Host access
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://kafka:9093,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - clickstream-net
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kafka topic initialization service
  # Runs once after Kafka broker is healthy to create the clickstream-events topic
  # Uses kafka-init service_healthy dependency to ensure broker is ready
  # Creates topic with 6 partitions (one per host CPU) and RF=1 (single dev broker)
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka broker...'
      until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9094 > /dev/null 2>&1; do
        echo 'Kafka not ready, retrying in 2s...'
        sleep 2
      done
      echo 'Kafka broker ready, creating topic...'
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists --topic clickstream-events --partitions 6 --replication-factor 1
      echo 'Topic created: clickstream-events'
      "
    networks:
      - clickstream-net
    mem_limit: 512m
    cpus: 0.5

  # Kafbat Kafka UI - Web interface for Kafka cluster inspection
  # Enables visual inspection of topics, messages, consumer groups, and partitions
  # Connects to Kafka via DOCKER listener (kafka:9094) for inter-container communication
  # Accessible at http://localhost:8080
  # Latest tag used due to Docker Hub versioning scheme (stable and actively maintained)
  kafka-ui:
    # Using :latest due to versioning scheme (v0.7.2 and similar tags not available on Docker Hub)
    # Latest tag is stable and actively maintained for kafbat/kafka-ui
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: clickstream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - clickstream-net
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # MongoDB 7.0.11 - Document database for aggregated session data
  # Stores aggregated clickstream events and session analytics
  # Initialized with clickstream_db database
  # Accessible at mongodb://localhost:27017/clickstream_db
  # WiredTiger storage engine used (default for MongoDB 7.0)
  mongodb:
    image: mongo:7.0.11
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: clickstream_db
    volumes:
      - mongo-data:/data/db
    networks:
      - clickstream-net
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  kafka-data:
  mongo-data:

networks:
  clickstream-net:
    driver: bridge
